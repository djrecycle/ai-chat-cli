name: Build Debian Release

on:
  push:
    tags:
      - "*"
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag release target (opsional untuk run manual)"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-deb-${{ github.event.release.tag_name || inputs.tag || github.ref_name || github.run_id }}
  cancel-in-progress: false

jobs:
  build-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev
          python -m pip install --upgrade pip

      - name: Build .deb packages
        id: build
        shell: bash
        run: |
          ./build-deb.sh --docs
          docs_path="$(ls dist/*.deb | head -n 1)"
          docs_release_path="${docs_path%.deb}-docs.deb"
          mv "$docs_path" "$docs_release_path"

          ./build-deb.sh
          deb_path="$(ls dist/*.deb | grep -v -- '-docs\.deb$' | head -n 1)"
          deb_name="$(basename "$deb_path")"
          docs_name="$(basename "$docs_release_path")"
          standard_label="Linux Debian package (standard)"
          docs_label="Linux Debian package (docs)"

          echo "deb_path=$deb_path" >> "$GITHUB_OUTPUT"
          echo "deb_name=$deb_name" >> "$GITHUB_OUTPUT"
          echo "docs_path=$docs_release_path" >> "$GITHUB_OUTPUT"
          echo "docs_name=$docs_name" >> "$GITHUB_OUTPUT"
          echo "standard_label=$standard_label" >> "$GITHUB_OUTPUT"
          echo "docs_label=$docs_label" >> "$GITHUB_OUTPUT"

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "release" ]]; then
            tag="${{ github.event.release.tag_name }}"
          elif [[ -n "${{ inputs.tag }}" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: debian-release-assets
          path: |
            ${{ steps.build.outputs.deb_path }}
            ${{ steps.build.outputs.docs_path }}

      - name: Ensure GitHub Release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ steps.meta.outputs.tag }}"

          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag sudah ada."
            exit 0
          fi

          gh release create "$tag" --verify-tag --generate-notes

      - name: Update GitHub Release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          tag="${{ steps.meta.outputs.tag }}"
          existing_body="$(gh release view "$tag" --json body --jq .body)"

          EXISTING_BODY="$existing_body" \
          STANDARD_DEB="${{ steps.build.outputs.deb_name }}" \
          DOCS_DEB="${{ steps.build.outputs.docs_name }}" \
          python - <<'PY' > /tmp/release-notes.md
          import os

          marker_start = "<!-- debian-assets-start -->"
          marker_end = "<!-- debian-assets-end -->"
          body = os.environ.get("EXISTING_BODY", "")
          standard = os.environ["STANDARD_DEB"]
          docs = os.environ["DOCS_DEB"]

          if marker_start in body and marker_end in body:
              before, rest = body.split(marker_start, 1)
              _, after = rest.split(marker_end, 1)
              body = (before + after).strip()

          asset_notes = "\n".join(
              [
                  marker_start,
                  "## Debian Packages",
                "",
                  f"- `{standard}` — Linux Debian package (standard)",
                  "  Paket standar untuk chat terminal utama.",
                  "",
                  f"- `{docs}` — Linux Debian package (docs)",
                  "  Paket standar + dependency fitur dokumen (`/file` untuk PDF, DOCX, dan OCR gambar).",
                  "",
                  "Catatan: varian `-docs` tetap lebih optimal jika `tesseract-ocr` tersedia di sistem untuk OCR gambar.",
                  marker_end,
              ]
          ).strip()

          final_parts = [asset_notes]
          if body.strip():
              final_parts.append(body.strip())
          print("\n\n".join(final_parts).strip())
          PY

      - name: Apply GitHub Release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit \
            "${{ steps.meta.outputs.tag }}" \
            --notes-file /tmp/release-notes.md

      - name: Upload .deb to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload \
            "${{ steps.meta.outputs.tag }}" \
            "${{ steps.build.outputs.deb_path }}#${{ steps.build.outputs.standard_label }}" \
            "${{ steps.build.outputs.docs_path }}#${{ steps.build.outputs.docs_label }}" \
            --clobber
